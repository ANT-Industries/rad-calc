version: "3.8"
services:
  app:
    image: registry.rodydavis.dev/rad-calc:latest
    ports:
      - target: 8181
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
        failure_action: rollback
      # healthcheck: # optional, recommended since v0.10.0
      #   test: wget --no-verbose --tries=1 --spider http://0.0.0.0:8181 || exit 1
      #   interval: 5s
      #   timeout: 5s
      #   retries: 5
